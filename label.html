<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Label Creation</title>

        <link rel="stylesheet" href="css/nav.css">
        <link rel="stylesheet" href="style.css">

    <style>

:root {
    --label-width: 5.5rem;
    --label-print-width: 18%;
    --textarea-width: 36ch;
}

        .top-bar {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .back-button {
            text-decoration: none;
            font-size: 2.5rem;
            line-height: 1;
            color: #18331F;
        }

        .top-bar h1 {
            font-family: "Times New Roman", serif;
            font-size: 2.2rem;
            color: #18331F;
            font-weight: 400;
        }

        .top-bar p {
            margin-top: .3rem;
            color: #333;
        }



        .label-tab-bar {
            display: grid;
            grid-template-columns: auto auto;
        }

        /* .tab-btn {
            min-height: 2rem;
            padding: 0.75rem;
            border-radius:  0.4rem;
            background: #F4ECE1;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.05);
            border: none;
        } */


.label-tab-bar {
    width: 100%;
    min-width: 200px;
    margin-bottom: 1rem;
    border-bottom: 4px solid #6b5b2477;;
    overflow: hidden;
    transition: border 250ms ease;
    padding-left: 22px;
}



.tab-btn {
    font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    letter-spacing: 0.1rem;
      display: block;
      height: 2.5rem;
    padding: 10px 24px 8px;
    background: #F4ECE1;
    margin-right: 23px;
    z-index: 2;
    position: relative;
    cursor: pointer;
    color: #777;
    border: none;
    text-transform: uppercase;
    font-weight: 400;
    border-radius: 8px 8px 0 0;
    transition: all 250ms ease;
}
.tab-btn:before,
.tab-btn:after {
  display: block;
  content: " ";
  position: absolute;
  top: 0;
  height: 100%;
  width: 22px;  
    background: #F4ECE1;
  transition: all 250ms ease;
}
.tab-btn:before {
  right: -12px;
  transform: skew(30deg, 0deg);
  box-shadow: rgba(0,0,0,.1) 3px 2px 5px, inset rgba(255,255,255,.09) -1px 0;
    border-radius: 0 8px 0 0;
}
.tab-btn:after {
  left: -12px;
  transform: skew(-30deg, 0deg);
  box-shadow: rgba(0,0,0,.1) -3px 2px 5px, inset rgba(255,255,255,.09) 1px 0;
    border-radius: 8px 0 0 0;
}
.tab-btn:hover,
.tab-btn:hover:before,
.tab-btn:hover:after {
  background-color: #F4F7F9;
  color: #444;
}
.tab-btn.active {
  z-index: 3;
}
.tab-btn.active,
.tab-btn.active:before,
.tab-btn.active:after {
  background: #eef4dc;
  color: #333;
}



        @media (max-width: 750px) {
            .table-wrap {
                display: none;
            }
        }

        @media (min-width:750px) {

            .collection-card {
                display: none;
            }

            #herbarium-cards {
                display: none;
            }

            .tab-btn {
                height: 3rem;
                font-size: 1.5rem;
                font-weight: 600;
            }
        }






            .label-form {
            /* display: flex;
            flex-direction: column;
            gap: .8rem; */

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
            }

            .label-form h2 {
            margin-top: .8rem;
            margin-bottom: .2rem;
            font-family: "Times New Roman", serif;
            font-size: .9rem;
            letter-spacing: .14rem;
            text-transform: uppercase;
            color: #18331F;
            }

            .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: .8rem;
            }

            .form-card {
            display: grid;
            grid-template-columns: 2.5rem 1fr;
            align-items: center;
            gap: .75rem;

            min-height: 4.3rem;
            padding: .5rem;

            border-radius: .8rem;
            background: #F4ECE1;
            box-shadow: 0 3px 12px rgba(0,0,0,.08);
            }

            .form-card-large {
            align-items: flex-start;
            }

            .form-icon {
            font-size: 1.7rem;
            color: #6b5a24;
            text-align: center;
            }

            .form-icon svg {
                height: 1.7rem;
                fill: #6b5a24;
            }

            .form-text {
            display: flex;
            flex-direction: column;
            gap: .25rem;
            }

            .form-label {
            font-weight: 600;
            color: #18331F;
            }

            input,
            textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font: inherit;
            color: #333;
            }

            textarea {
            min-height: 4.5rem;
            resize: none;
            }

            input::placeholder,
            textarea::placeholder {
            color: rgba(0,0,0,.4);
            }

            .no-print-btn {
            margin-top: 1rem;
            min-height: 4rem;

            border: none;
            border-radius: .8rem;

            background: #18331F;
            color: #E1B24B;

            font-family: "Times New Roman", serif;
            font-size: 1.1rem;
            letter-spacing: .12rem;
            text-transform: uppercase;

            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            }

            .no-print-btn span svg {
                height: 1.5rem;
                fill: #E1B24B;;
            }

            .longitude, .latitude, .altitude {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;    
            }

            .geodata {
                width: 80%;
            }

            #genusInput, #speciesInput, #subSpeciesInput {
                font-style: italic;
            }

            #speciesAuthorInput, #subSpeciesAuthor {
                font-variant: small-caps;
                text-transform: capitalize;
            }

                        .placeholder {
                background: transparent;
                box-shadow: none;
            }

        @media (max-width: 750px) {
            .label-form {
                display: flex;
                flex-direction: column;
                gap: 0.8rem;
            }

            .placeholder {
                display: none;
            }
        }



@media print {
    @page {
        size: A4 portrait;
        margin: 15mm 40mm 40mm 40mm;
    }

    body {
        background: #fff;
        color: #000;
        font-family: 'Times New Roman', Times, serif;
        font-size: 10pt;
        line-height: 1.5;
        margin: 0;
        padding: 0;
        overflow: visible;
        min-height: auto;
    }



    .print-container,
    .main-wrap {
        box-shadow: none;
    }

    .no-print,
    .no-print-btn,
    .print-input
    .bottom-nav {
        display: none !important;
    }

    .print-text {
        display: inline-block !important;
        color: #222;
        font-family: inherit;
        text-align: left;
        white-space: pre-wrap;
    }

    h1 {
        font-size: 1.2rem;
    }

    .italic-print {
        font-style: italic;
    }

    .small-caps-print {
        font-variant: small-caps;
    }

    #locationPrint,
    #habitatPrint,
    #annotationPrint {
        width: var(--textarea-width);
        text-align: justify;
    }

    label {
        width: var(--label-print-width);
        min-width: var(--label-print-width);
        margin-right: 10px;
    }

    #latitudePrint,
    #longitudePrint,
    #altitudePrint {
        margin-left: 1ch;
    }


    .inline-label {
        width: fit-content;
        min-width: 0;
        margin-right: 0;
    }

    .line {
        margin-bottom: 0.2rem;
    }

    .family-line {margin-bottom: .5rem;}
}


    </style>
</head>

            <div class="top-bar no-print">
                <a href="index.html" class="back-button">‹</a>

                    <p>Erstelle ein neues Herbarium-Etikett.</p>
                </div>
            </div>

                <button class="tab-btn active" onclick="openLabel('newLabel')">Neues Etikett</button>
                <button class="tab-btn" onclick="openLabel('templates')">Etikett-Vorlagen</button>
            </div>

            <label class="form-card placeholder"></label>

        window.onbeforeprint = function() {
            copyInputValuesToPrintText();
            hideEmptyPrintLines();
            hideSubSpeciesIfUnchecked();
        };

        window.onafterprint = function () {
            resetHiddenLines();
        };

        function copyInputValuesToPrintText() {
            document.querySelectorAll(".print-input[data-print-target]").forEach(input => {
                const targetID = input.dataset.printTarget;
                const target = document.getElementById(targetID);

                if (!target) return;

                if (input.type === "date" && input.value) {
                    target.textContent = formatDate(input.value);
                } else {
                    target.textContent = input.value.trim();
                }
            });
        }

        function hideEmptyPrintLines() {
            document.querySelectorAll("[data-hide-if-empty]").forEach(line => {
                const inputId = line.dataset.hideIfEmpty;
                const input = document.getElementById(inputId);

                if (!input) return;

                line.style.display = input.value.trim() === "" ? "none" : "";
            });
        }

        function hideSubSpeciesIfUnchecked() {
            const checkbox = document.getElementById("subSpeciesCheck");
            const line = document.querySelector(".subspecies-line");

            if (!checkbox || !line) return;

            line.style.display = checkbox.checked ? "" : "none";
        };

        function resetHiddenLines() {
            document.querySelectorAll(".subspecies-line, .location-line, .habitat-line, .annotation-line").forEach(line => {
                line.style.display = "";
            });
        }

        function formatDate(value) {
            const [year, month, day] = value.split("-");
            return `${day}.${month}.${year}`;
        }

        function applyVersion(version) {

            if (version === "scientific") {

                document.documentElement.style.setProperty( "--label-width", "2rem");
                document.documentElement.style.setProperty( "--label-print-width", "6%");
                document.documentElement.style.setProperty( "--textarea-width", "44ch");

            } else {
                document.documentElement.style.setProperty("--label-width", "5.5rem");
                document.documentElement.style.setProperty("--label-print-width", "18%");
                document.documentElement.style.setProperty( "--textarea-width", "42ch");
            }
        }
