                <div class="collector-line line">
                    <label id="collectorLabel">Sammler:</label>

                    <div class="form-group">
                        <input type="text" id="collectorFirstNameInput" class="print-input" data-print-target="collectorFirstNamePrint" placeholder="Vorname">

                    </div>

                    <div class="form-group">
                        <input type="text"id="collectorLastNameInput" class="print-input" data-print-target="collectorLastNamePrint" placeholder="Nachname">

                    </div>
                    <div class="form-group">
                        <input type="text"id="collectorNumberInput" class="print-input" data-print-target="collectorNumberPrint" placeholder="##">

                </div>

                <div class="determiner-line line">

                    <div class="form-group">
                        <input type="date" id="dateInput" class="print-input" data-print-target="datePrint">

                    </div>

                    <label for="determinerFirstNameInput" id="determinerLabel" class="inline-label bold-label">Bestimmer:</label>

                    <div class="form-group">
                        <input type="text" id="determinerFirstNameInput" class="print-input" data-print-target="determinerFirstNamePrint" placeholder="Vorname">
